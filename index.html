<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leia!</title>
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Header (Institutional Top Bar) -->
    <header class="main-header">
        <div class="header-logo">
            <img src="logo.jpg" alt="Leia Logo" class="logo-image">
        </div>
        <div class="header-status">
            <!-- Library Navigation Button -->
            <button id="btn-nav-library" class="btn-nav-library" title="Minha Biblioteca">
                <i data-lucide="book-open"></i>
                <span class="btn-label">Minha Biblioteca</span>
            </button>
            <!-- Theme Toggle Button -->
            <button id="btn-theme-toggle" class="btn-theme-toggle" title="Alternar Tema (Claro/Escuro)">
                <i data-lucide="sun" class="theme-icon-sun" style="display: none;"></i>
                <i data-lucide="moon" class="theme-icon-moon"></i>
            </button>
        </div>
    </header>

    <main class="app-container">
        <!-- Upload & Description Section (Minimalist Layout) -->
        <section id="upload-section" class="upload-section active">
            <div class="home-container">
                <!-- Action Column (Centered) -->
                <div class="action-column">
                    <div id="dropzone" class="dropzone">
                        <input type="file" id="file-input" accept="application/pdf" hidden>
                        <div class="dropzone-content">
                            <i data-lucide="file-text" class="upload-icon"></i>
                            <h3>Importar Documento</h3>
                            <p class="dropzone-text">Arraste o arquivo PDF aqui ou <span class="highlight">clique para selecionar</span></p>
                            <p class="dropzone-limit">Suporta apenas formato .pdf</p>
                        </div>
                        
                        <!-- Error Toast Inside Dropzone -->
                        <div id="error-message" class="error-toast">
                            <i data-lucide="alert-circle" class="error-icon"></i>
                            <span id="error-text">Formato inválido! Por favor selecione um PDF.</span>
                        </div>
                    </div>

                    <!-- History / Recent Books -->
                    <div id="history-container" class="history-container">
                        <div class="history-header">
                            <h3><i data-lucide="history" class="history-icon"></i> DOCUMENTOS RECENTES</h3>
                            <button id="btn-clear-history" class="btn-clear" title="Limpar todo o histórico">Limpar Histórico</button>
                        </div>
                        <div id="history-grid" class="history-grid">
                            <!-- History cards will be rendered here dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Library Section -->
        <section id="library-section" class="library-section">
            <div class="home-container">
                <div class="action-column">
                    <!-- Library Title & Back Button -->
                    <div class="history-header" style="border-bottom: none; margin-bottom: 0.5rem; padding-bottom: 0;">
                        <h2 style="font-size: 1.1rem; font-weight: 800; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; margin: 0;">
                            <i data-lucide="book-open" style="width: 1.2rem; height: 1.2rem;"></i> Minha Biblioteca
                        </h2>
                        <button id="btn-library-back" class="btn-clear" style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); cursor: pointer;" title="Voltar ao início">
                            <i data-lucide="arrow-left" style="width: 0.85rem; height: 0.85rem; vertical-align: middle; margin-right: 0.2rem;"></i>Voltar
                        </button>
                    </div>

                    <!-- Search Bar -->
                    <div class="search-box">
                        <div class="search-input-wrapper">
                            <i data-lucide="search" class="search-icon-inside"></i>
                            <input type="text" id="library-search-input" placeholder="Buscar livros para adicionar (ex: O Pequeno Príncipe)...">
                            <button id="btn-library-search" class="btn-search-action">Buscar</button>
                        </div>
                    </div>

                    <!-- Saved Books List -->
                    <div class="library-list-container">
                        <div class="history-header" style="margin-top: 1rem;">
                            <h3><i data-lucide="library" class="history-icon"></i> LIVROS SALVOS</h3>
                        </div>
                        <div id="library-grid" class="history-grid">
                            <!-- Library cards rendered dynamically -->
                        </div>
                    </div>

                    <!-- Search Results -->
                    <div id="search-results-container" class="search-results-container" style="display: none; margin-top: 1rem;">
                        <div class="history-header">
                            <h3><i data-lucide="globe" class="history-icon"></i> RESULTADOS DA BUSCA</h3>
                            <button id="btn-clear-search-results" class="btn-clear">Limpar</button>
                        </div>
                        <div id="search-results-grid" class="history-grid">
                            <!-- Search results cards rendered dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Kindle Mockup Section -->
        <section id="reader-section" class="reader-section">
            <div class="reader-actions">
                <button id="btn-back" class="btn-secondary">
                    <i data-lucide="arrow-left"></i>
                    <span>Voltar à lista</span>
                </button>
                <div class="reader-filename" id="reader-filename">Carregando...</div>
                <div class="reader-actions-right">
                    <!-- Theme Toggle Button (Inside Reader) -->
                    <button id="btn-reader-theme-toggle" class="btn-theme-toggle btn-secondary" title="Alternar Tema (Claro/Escuro)">
                        <i data-lucide="sun" class="theme-icon-sun" style="display: none;"></i>
                        <i data-lucide="moon" class="theme-icon-moon"></i>
                    </button>
                    <button id="btn-fullscreen" class="btn-secondary">
                        <i data-lucide="maximize"></i>
                        <span>Tela Cheia</span>
                    </button>
                </div>
            </div>

            <!-- Kindle Device Wrap -->
            <div class="kindle-device-container">
                <div class="kindle-device">
                    <!-- Device Bezel -->
                    <div class="kindle-bezel">
                        <!-- Kindle Screen -->
                        <div class="kindle-screen" id="kindle-screen">
                            <!-- Invisible Touch Zones for natural page turning -->
                            <div id="zone-prev" class="touch-zone zone-prev" title="Página anterior">
                                <span class="touch-hint"><i data-lucide="chevron-left"></i></span>
                            </div>
                            <div id="zone-next" class="touch-zone zone-next" title="Próxima página">
                                <span class="touch-hint"><i data-lucide="chevron-right"></i></span>
                            </div>

                            <!-- Screen Canvas / PDF Renderer -->
                            <div class="pdf-container">
                                <canvas id="pdf-canvas"></canvas>
                            </div>

                             <!-- Loading Spinner Overlay -->
                             <div id="loading-overlay" class="loading-overlay">
                                 <div class="spinner-wrapper">
                                     <div class="spinner"></div>
                                     <p>Carregando e-ink...</p>
                                 </div>
                             </div>

                             <!-- Kindle Footer Page Selector -->
                             <div class="kindle-footer">
                                 <div class="page-selector">
                                     <span>Pág.</span>
                                     <input type="number" id="page-input" class="page-input" min="1" value="1">
                                     <span>de <span id="page-total">1</span></span>
                                 </div>
                             </div>
                         </div>

                        <!-- Bezel Bottom Branding -->
                        <div class="kindle-bezel-bottom">
                            <span class="kindle-logo">Leia</span>
                        </div>
                    </div>
                    <!-- Kindle Shadow and Glossy Glare -->
                    <div class="kindle-glare"></div>
                </div>
        </section>
    </main>

    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="app.js"></script>
</body>
</html>
